<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            min-height: 200px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-icon {
            font-size: 24px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 700;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .status-text {
            font-size: 13px;
            color: #94a3b8;
        }

        .status-text.active {
            color: #22c55e;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #374151;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #22c55e;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
        }

        .stat-label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .stat-box.danger .stat-value {
            color: #ef4444;
        }

        .stat-box.warning .stat-value {
            color: #f59e0b;
        }

        .view-dashboard {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .view-dashboard:hover {
            background: #2563eb;
        }

        .footer {
            margin-top: 12px;
            text-align: center;
            font-size: 10px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-icon">🛡️</span>
        <h1>Sentinel Monitor</h1>
    </div>

    <div class="status">
        <span class="status-text" id="statusText">Monitoring Active</span>
        <label class="toggle">
            <input type="checkbox" id="monitorToggle" checked>
            <span class="toggle-slider"></span>
        </label>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" id="alertCount">0</div>
            <div class="stat-label">Alerts Today</div>
        </div>
        <div class="stat-box warning">
            <div class="stat-value" id="riskLevel">Low</div>
            <div class="stat-label">Current Risk</div>
        </div>
    </div>

    <button class="view-dashboard" id="viewDashboardBtn">📊 View Full Dashboard</button>
    <button class="view-dashboard" id="testAlertBtn" style="margin-top: 8px; background: #4b5563;">🧪 Test Alert Popup</button>

    <div class="footer">
        Sentinel v1.0 | Protecting your digital wellbeing
    </div>

    <script src="popup.js"></script>
</body>
</html>
